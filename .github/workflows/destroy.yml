name: Destroy Homelab Infrastructure

on:
  workflow_dispatch:
    inputs:
      apply_destroy:
        description: 'IMPORTANT: Whether to actually destroy the resources. Uncheck for a dry run (plan -destroy only).'
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    name: 'Terraform Destroy'
    runs-on: ubuntu-latest
    
    defaults:
      run:
        shell: bash

    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan (Destroy)
      run: terraform plan -destroy -out=tfplan

    - name: Terraform Apply (Destroy)
      if: ${{ inputs.apply_destroy == true }}
      run: terraform apply -destroy -auto-approve tfplan
